services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pyra
      POSTGRES_USER: pyra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pyra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyra -d pyra"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql://pyra:${POSTGRES_PASSWORD}@db:5432/pyra
      - ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - DATABASE_URL=postgresql://pyra:${POSTGRES_PASSWORD}@db:5432/pyra
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ENV=${ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - ACCESS_TOKEN_EXPIRE_HOURS=${ACCESS_TOKEN_EXPIRE_HOURS:-8}
      - NASA_FIRMS_API_KEY=${NASA_FIRMS_API_KEY:-}
      - LOCAL_OSRM_URL=http://osrm:5000/route/v1/driving
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional local OSRM — start with: docker compose --profile osrm up
  osrm:
    image: osrm/osrm-backend:latest
    profiles: ["osrm"]
    command: osrm-routed --algorithm mld /data/region.osrm
    ports:
      - "5001:5000"
    volumes:
      - ./osrm-data:/data:ro
    restart: unless-stopped

volumes:
  pyra_pg_data: